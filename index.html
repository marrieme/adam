<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Undangan Pernikahan Adam & Juliet</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #2b2b2b;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Bungkusan HP dikembalikan ke size full layar */
        .mobile-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background-color: #1a1a1a;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            overflow: hidden;
            position: relative;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Video Background */
        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        /* Overlay gelap di atas video */
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom,
                    rgba(0, 0, 0, 0.35) 0%,
                    rgba(0, 0, 0, 0.2) 50%,
                    rgba(0, 0, 0, 0.65) 100%);
            z-index: 1;
        }

        /* SHAPE LENGKUNG DI BAWAH */
        .mobile-container::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: -20%;
            width: 140%;
            height: 35%;
            background-color: rgba(45, 38, 34, 0.85);
            border-radius: 50% 50% 0 0;
            z-index: 2;
        }

        /* Area Teks & Tombol */
        .content-area {
            position: relative;
            z-index: 3;
            text-align: center;
            width: 100%;
            padding: 20px;
            transform: translateY(-15px);
        }

        .content-area p {
            color: #f5ede6;
            font-size: 1.1em;
            margin-bottom: 5px;
            text-shadow: 0 1px 6px rgba(0, 0, 0, 0.6);
        }

        h1 {
            font-size: 2.8em;
            color: #fff;
            margin: 10px 0 20px 0;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
        }

        /* DESAIN TOMBOL */
        .btn-buka {
            display: inline-block;
            padding: 15px 30px;
            background-color: #45413F;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            margin-top: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .btn-buka:hover {
            background-color: #5a4a42;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>

<body>

    <div class="mobile-container">
        <!-- Video Background -->
        <video class="bg-video" autoplay muted loop playsinline>
            <source src="adot.mp4" type="video/mp4">
        </video>

        <!-- Overlay Gelap -->
        <div class="video-overlay"></div>

        <div class="content-area">
            <p>The Wedding Of</p>
            <h1>Adam & Marwah</h1>
            <p>Minggu, 19 Juli 2026</p>

            <a href="wedding.html" id="btn-buka" class="btn-buka">Buka Undangan</a>
        </div>

        <audio id="bg-music" autoplay loop>
            <source src="song.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const audio = document.getElementById('bg-music');
        const savedTime = sessionStorage.getItem('bgm_time');

        if (savedTime) {
            audio.currentTime = parseFloat(savedTime);
        }

        function playAudio() {
            audio.play().then(() => {
                sessionStorage.setItem('bgm_playing', 'true');
                removeInteractionListeners();
            }).catch(e => {
                console.log("Autoplay blocked by browser. Awaiting user interaction.");
            });
        }

        function removeInteractionListeners() {
            document.removeEventListener('click', playAudio);
            document.removeEventListener('touchstart', playAudio);
            window.removeEventListener('scroll', playAudio);
        }

        // Coba putar langsung
        playAudio();

        // Jika diblokir, putar saat user menyentuh, klik, atau scroll layar
        document.addEventListener('click', playAudio);
        document.addEventListener('touchstart', playAudio);
        window.addEventListener('scroll', playAudio);

        setInterval(() => {
            if (!audio.paused) {
                sessionStorage.setItem('bgm_time', audio.currentTime);
            }
        }, 300);

        // Pause saat pindah tab / minimize, lanjut saat kembali
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                audio.pause();
            } else {
                if (sessionStorage.getItem('bgm_playing') === 'true') {
                    playAudio();
                }
            }
        });

        // Pause saat keluar dari browser / pindah app (untuk HP)
        window.addEventListener('pagehide', () => {
            audio.pause();
            sessionStorage.setItem('bgm_playing', 'false');
        });

        window.addEventListener('blur', () => {
            audio.pause();
        });

        window.addEventListener('focus', () => {
            if (sessionStorage.getItem('bgm_playing') === 'true') {
                playAudio();
            }
        });

        // Saat klik Buka Undangan, pastikan flag diset true
        document.getElementById('btn-buka').addEventListener('click', () => {
            sessionStorage.setItem('bgm_playing', 'true');
        });
    </script>
</body>

</html>
