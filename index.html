<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Undangan Pernikahan Adam & Juliet</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #2b2b2b;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Bungkusan HP dikembalikan ke size full layar */
        .mobile-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            /* Dikembalikan ke 100vh biar full atas-bawah */
            background-color: #e3d5ca;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            /* Ujung tetap tumpul membelok */
            overflow: hidden;
            position: relative;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* SHAPE LENGKUNG DI BAWAH */
        .mobile-container::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: -20%;
            width: 140%;
            height: 35%;
            background-color: #45413F;
            border-radius: 50% 50% 0 0;
            z-index: 1;
        }

        /* Area Teks & Tombol */
        .content-area {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 100%;
            padding: 20px;
            transform: translateY(-15px);
        }

        .content-area p {
            color: #5a4a42;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        h1 {
            font-size: 2.8em;
            color: #5a4a42;
            margin: 10px 0 20px 0;
        }

        /* DESAIN TOMBOL */
        .btn-buka {
            display: inline-block;
            padding: 15px 30px;
            background-color: #45413F;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            margin-top: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .btn-buka:hover {
            background-color: #5a4a42;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>

<body>

    <div class="mobile-container">
        <div class="content-area">
            <p>The Wedding Of</p>
            <h1>Adam & Juliet</h1>
            <p>Minggu, 19 Juli 2026</p>

            <a href="wedding.html" id="btn-buka" class="btn-buka">Buka Undangan</a>
        </div>

        <audio id="bg-music" autoplay loop>
            <source src="song.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const audio = document.getElementById('bg-music');

        const isPlaying = sessionStorage.getItem('bgm_playing') === 'true';
        const savedTime = sessionStorage.getItem('bgm_time');

        if (savedTime) {
            audio.currentTime = parseFloat(savedTime);
        }

        audio.play().then(() => {
            sessionStorage.setItem('bgm_playing', 'true');
        }).catch(e => console.log("Autoplay dicegah oleh browser"));

        setInterval(() => {
            if (!audio.paused) {
                sessionStorage.setItem('bgm_time', audio.currentTime);
            }
        }, 300);

        // Pause saat pindah tab / minimize, lanjut saat kembali
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                audio.pause();
            } else {
                if (sessionStorage.getItem('bgm_playing') === 'true') {
                    audio.play().catch(e => { });
                }
            }
        });

        // Pause saat keluar dari browser / pindah app (untuk HP)
        window.addEventListener('pagehide', () => {
            audio.pause();
            sessionStorage.setItem('bgm_playing', 'false');
        });

        window.addEventListener('blur', () => {
            audio.pause();
        });

        window.addEventListener('focus', () => {
            if (sessionStorage.getItem('bgm_playing') === 'true') {
                audio.play().catch(e => { });
            }
        });

        // Saat klik Buka Undangan, otomatis play musik
        document.getElementById('btn-buka').addEventListener('click', () => {
            sessionStorage.setItem('bgm_playing', 'true');
        });
    </script>
</body>

</html>
